version: "3"
services:
  web:
    build:
      context: ./docker
    platform: linux/amd64
    image: "ponpoko"
    container_name: "ponpoko"
    ports:
      - "80:80"
      - "8888:8080"
    tty: true
    stdin_open: true
    volumes:
      - ./:/var/www/vue:delegated
    working_dir: /var/www/vue
    privileged: true
